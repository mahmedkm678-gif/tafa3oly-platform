<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة المدرس - تفاعلي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/frontend/css/design-system.css">
  <style>
    body { padding-bottom: 40px; }
    .offer-price { width: 80px; }
  </style>
</head>
<body>
  <div class="glow-ambient glow-purple"></div>
  <div class="glow-ambient glow-blue"></div>
  <div id="navbar"></div>

  <div class="container" style="padding-top: 32px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
      <div>
        <h2 style="margin-bottom:4px;">مرحباً، أ. <span class="gradient-text" id="userDisplayName"></span></h2>
        <span style="color:var(--text-muted);font-size:0.85rem;" id="tutorLevel"></span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="online-badge"><span class="dot"></span> متصل</span>
        <a href="/edit-profile" class="btn btn-sm btn-secondary"><i class="fas fa-user-edit"></i> تعديل البروفايل</a>
      </div>
    </div>

    <div class="card" style="padding: 16px;">
      <!-- Level-specific tabs -->
      <div class="tab-bar" id="levelTabs"></div>
      <div id="tabContents"></div>
    </div>
  </div>

  <div id="footer"></div>

  <!-- Offer Modal -->
  <div class="modal-overlay" id="offerModal">
    <div class="modal" id="offerModalContent">
      <h3>إرسال عرض سعر</h3>
      <p id="modalFileInfo" style="color:var(--text-muted);margin-bottom:12px;font-size:0.9rem;"></p>
      <div class="form-group">
        <label>سعرك</label>
        <input type="number" id="modalPrice" step="0.01" min="1">
      </div>
      <div class="form-group">
        <label>نوع الدفع</label>
        <select id="modalPaymentType">
          <option value="per_session">بالحصة</option>
          <option value="monthly">شهري</option>
        </select>
      </div>
      <div class="modal-btns">
        <button class="btn btn-primary" onclick="submitOffer()">إرسال العرض</button>
        <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      </div>
      <p id="modalError" style="color:#EF4444;font-size:0.85rem;margin-top:8px;display:none;"></p>
    </div>
  </div>

  <!-- Progress Modal -->
  <div class="modal-overlay" id="progressModal">
    <div class="modal">
      <h3>تسجيل تقدم</h3>
      <p id="progressSessionInfo" style="color:var(--text-muted);margin-bottom:12px;font-size:0.9rem;"></p>
      <div id="progressFields"></div>
      <div class="form-group">
        <label>ملاحظات المدرس</label>
        <textarea id="progressTutorNotes" placeholder="..."></textarea>
      </div>
      <div class="modal-btns">
        <button class="btn btn-success" onclick="submitProgress()">حفظ</button>
        <button class="btn btn-ghost" onclick="closeProgressModal()">إلغاء</button>
      </div>
      <p id="progressError" style="color:#EF4444;font-size:0.85rem;margin-top:8px;display:none;"></p>
    </div>
  </div>

  <script src="/frontend/js/shared.js"></script>
  <script>
    if (!isLoggedIn() || !isTutor()) { window.location.href = '/login'; }

    const user = getUser();
    document.getElementById('userDisplayName').textContent = user.first_name || user.username;
    const tutorLevel = user.teaching_level || 'quran';
    document.getElementById('tutorLevel').textContent = 'مختص في: ' + (LEVEL_MAP[tutorLevel] || tutorLevel);

    const tabsDiv = document.getElementById('levelTabs');
    const contentsDiv = document.getElementById('tabContents');

    // Single tab for tutor's level
    tabsDiv.innerHTML = `<span class="tab active"><i class="fas ${LEVEL_ICONS[tutorLevel] || 'fa-book'}"></i> ${LEVEL_MAP[tutorLevel] || tutorLevel}</span>`;
    contentsDiv.innerHTML = buildTabContent(tutorLevel);
    loadLevelData(tutorLevel);

    function buildTabContent(level) {
      return `
        <h3>الملفات المتاحة — ${LEVEL_MAP[level]}</h3>
        <div id="availableFiles"><p class="empty">جاري التحميل...</p></div>
        <h3 style="margin-top:20px;">عروضي المرسلة</h3>
        <div id="myOffers"><p class="empty">لم ترسل أي عروض</p></div>
        <h3 style="margin-top:20px;">جلساتي النشطة</h3>
        <div id="mySessions"><p class="empty">لا توجد جلسات نشطة</p></div>
      `;
    }

    async function loadLevelData(level) {
      loadAvailableFiles(level);
      loadMyOffers(level);
      loadSessions(level);
    }

    let currentFileId = null;
    let currentSessionId = null;
    let pingInterval = null;

    function startPing() {
      sendPing();
      pingInterval = setInterval(sendPing, 30000);
    }
    async function sendPing() {
      try { await api('POST', '/users/ping/'); } catch {}
    }
    startPing();

    // === Load Available Files ===
    async function loadAvailableFiles(level) {
      const el = document.getElementById('availableFiles');
      if (!el) return;
      try {
        const res = await fetch(API_BASE + `/files/?level=${level}`, {
          headers: { 'Authorization': 'Bearer ' + getToken() },
        });
        const files = await res.json();
        if (!Array.isArray(files) || !files.length) { el.innerHTML = '<p class="empty">لا توجد ملفات متاحة لهذا المستوى</p>'; return; }
        el.innerHTML = `<div class="table-wrap"><table>
          <tr><th>#</th><th>التفاصيل</th><th>النوع</th><th>السعر الأساسي</th><th>إجراء</th></tr>
          ${files.map(f => `<tr>
            <td>${f.id}</td>
            <td>${f.specialization || f.subject_type || level} ${f.difficulty ? '· ' + f.difficulty : ''}</td>
            <td>${f.session_type === 'solo' ? 'فردي' : 'مجموعة'}</td>
            <td>${f.base_price || '—'} ${f.currency || ''}</td>
            <td><button class="btn btn-sm btn-primary" onclick="openModal(${f.id}, '${(f.specialization || level)}')">إرسال عرض</button></td>
          </tr>`).join('')}
        </table></div>`;
      } catch { el.innerHTML = '<p class="empty">خطأ في التحميل</p>'; }
    }

    // === My Offers ===
    async function loadMyOffers(level) {
      const el = document.getElementById('myOffers');
      if (!el) return;
      try {
        const res = await api('GET', '/offers/');
        if (!Array.isArray(res) || !res.length) { el.innerHTML = '<p class="empty">لم ترسل أي عروض</p>'; return; }
        el.innerHTML = `<div class="table-wrap"><table>
          <tr><th>#</th><th>سعري</th><th>نوع الدفع</th><th>الحالة</th><th>التاريخ</th></tr>
          ${res.map(o => `<tr>
            <td>${o.id}</td>
            <td>${o.tutor_price || o.price}</td>
            <td>${o.payment_type === 'monthly' ? 'شهري' : 'بالحصة'}</td>
            <td><span class="badge badge-${o.status}">${o.status}</span></td>
            <td>${new Date(o.created_at).toLocaleDateString('ar')}</td>
          </tr>`).join('')}
        </table></div>`;
      } catch { el.innerHTML = '<p class="empty">خطأ في التحميل</p>'; }
    }

    // === Sessions ===
    async function loadSessions(level) {
      const el = document.getElementById('mySessions');
      if (!el) return;
      try {
        const res = await api('GET', '/offers/');
        const accepted = Array.isArray(res) ? res.filter(o => o.status === 'accepted') : [];
        if (!accepted.length) { el.innerHTML = '<p class="empty">لا توجد جلسات نشطة</p>'; return; }
        el.innerHTML = accepted.map(o => `
          <div class="session-card">
            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
              <div>
                <strong>💰 ${o.tutor_price} ${o.file?.currency || ''} · ${o.payment_type === 'monthly' ? 'شهري' : 'بالحصة'}</strong>
                ${o.file?.current_juz ? `<div style="color:var(--text-muted);font-size:0.82rem;">الجزء ${o.file.current_juz} ← ${o.file.start_juz}</div>` : ''}
              </div>
              <button class="btn btn-sm btn-success" onclick="openProgressModal(${o.id}, 'session')">تسجيل تقدم</button>
            </div>
            <div id="sessionProgress-${o.id}" style="margin-top:8px;"></div>
          </div>
        `).join('');
        accepted.forEach(o => loadSessionProgress(o.id));
      } catch { el.innerHTML = '<p class="empty">خطأ في التحميل</p>'; }
    }

    async function loadSessionProgress(sessionId) {
      const container = document.getElementById('sessionProgress-' + sessionId);
      if (!container) return;
      try {
        const res = await api('GET', `/offers/progress/?session_id=${sessionId}`);
        if (!Array.isArray(res) || !res.length) { container.innerHTML = '<p style="color:var(--text-muted);font-size:0.82rem;">لا يوجد تقدم مسجل بعد</p>'; return; }
        container.innerHTML = res.map(e => {
          const fromto = e.juz_from ? `الجزء ${e.juz_from} ← ${e.juz_to}` :
            e.unit_from ? `${e.unit_from} ← ${e.unit_to}` :
            e.cefr_from ? `${e.cefr_from} ← ${e.cefr_to}` : '—';
          return `<div class="progress-row"><strong>${fromto}</strong> <span style="color:var(--text-muted);font-size:0.8rem;">${new Date(e.created_at).toLocaleDateString('ar')}</span>${e.tutor_notes ? '<div>📝 ' + e.tutor_notes + '</div>' : ''}</div>`;
        }).join('');
      } catch {}
    }

    // === Offer Modal ===
    function openModal(fileId, info) {
      currentFileId = fileId;
      document.getElementById('modalFileInfo').textContent = info;
      document.getElementById('modalPrice').value = '';
      document.getElementById('modalPaymentType').value = 'per_session';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('offerModal').classList.add('active');
    }
    function closeModal() { document.getElementById('offerModal').classList.remove('active'); currentFileId = null; }

    async function submitOffer() {
      const price = document.getElementById('modalPrice').value;
      const paymentType = document.getElementById('modalPaymentType').value;
      if (!price || price <= 0) { document.getElementById('modalError').textContent = 'أدخل سعراً صحيحاً'; document.getElementById('modalError').style.display = 'block'; return; }
      try {
        await api('POST', '/offers/create/', { file_id: currentFileId, tutor_price: price, payment_type: paymentType });
        alert('تم إرسال العرض');
        closeModal();
        loadLevelData(tutorLevel);
      } catch (e) { document.getElementById('modalError').textContent = e.data?.error || e.message; document.getElementById('modalError').style.display = 'block'; }
    }

    // === Progress Modal ===
    function openProgressModal(sessionId) {
      currentSessionId = sessionId;
      document.getElementById('progressSessionInfo').textContent = 'تسجيل تقدم الجلسة رقم ' + sessionId;
      document.getElementById('progressTutorNotes').value = '';
      document.getElementById('progressError').style.display = 'none';

      const level = tutorLevel;
      let fieldsHtml = '';
      if (level === 'quran') {
        fieldsHtml = `<div class="form-row"><div class="form-group"><label>من الجزء</label><input type="number" id="progressFrom" min="1" max="30"></div><div class="form-group"><label>إلى الجزء</label><input type="number" id="progressTo" min="1" max="30"></div></div>`;
      } else if (level === 'kindergarten') {
        fieldsHtml = `<div class="form-row"><div class="form-group"><label>من الوحدة</label><input type="text" id="progressFrom" placeholder="وحدة 3"></div><div class="form-group"><label>إلى الوحدة</label><input type="text" id="progressTo" placeholder="وحدة 5"></div></div>`;
      } else if (level === 'languages') {
        fieldsHtml = `<div class="form-row"><div class="form-group"><label>من مستوى CEFR</label><select id="progressFrom"><option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option><option>C2</option></select></div><div class="form-group"><label>إلى مستوى CEFR</label><select id="progressTo"><option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option><option>C2</option></select></div></div>`;
      } else {
        fieldsHtml = '<p style="color:var(--text-muted);">هذا المستوى لا يتطلب تتبع تقدم رقمي</p>';
      }
      document.getElementById('progressFields').innerHTML = fieldsHtml;
      document.getElementById('progressModal').classList.add('active');
    }
    function closeProgressModal() { document.getElementById('progressModal').classList.remove('active'); currentSessionId = null; }

    async function submitProgress() {
      const tutorNotes = document.getElementById('progressTutorNotes').value;
      const payload = { session_id: currentSessionId, tutor_notes: tutorNotes };
      const level = tutorLevel;

      if (level === 'quran' || level === 'kindergarten' || level === 'languages') {
        payload.progress_type = level;
        if (level === 'quran') { payload.juz_from = parseInt(document.getElementById('progressFrom').value); payload.juz_to = parseInt(document.getElementById('progressTo').value); }
        else if (level === 'kindergarten') { payload.unit_from = document.getElementById('progressFrom').value; payload.unit_to = document.getElementById('progressTo').value; }
        else if (level === 'languages') { payload.cefr_from = document.getElementById('progressFrom').value; payload.cefr_to = document.getElementById('progressTo').value; }
      }

      if (!payload.juz_from && !payload.unit_from && !payload.cefr_from) {
        if (level !== 'university' && level !== 'high_school' && level !== 'middle_school' && level !== 'primary') {
          document.getElementById('progressError').textContent = 'يرجى تعبئة الحقول المطلوبة';
          document.getElementById('progressError').style.display = 'block'; return;
        }
      }

      try {
        await api('POST', '/offers/progress/create/', payload);
        alert('تم تسجيل التقدم');
        closeProgressModal();
        loadLevelData(tutorLevel);
      } catch (e) { document.getElementById('progressError').textContent = e.data?.error || e.message; document.getElementById('progressError').style.display = 'block'; }
    }

    // Auto-refresh
    setInterval(() => loadLevelData(tutorLevel), 15000);
  </script>
</body>
</html>
