<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الطالب - تفاعلي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/design-system.css">
  <style>
    body { padding-bottom: 40px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="glow-ambient glow-purple"></div>
  <div class="glow-ambient glow-blue"></div>
  <div id="navbar"></div>

  <div class="container" style="padding-top: 32px;">
    <h2 style="margin-bottom:6px;">مرحباً، <span class="gradient-text" id="userDisplayName"></span></h2>
    <p style="color:var(--text-muted);margin-bottom:20px;font-size:0.9rem;" id="levelsDisplay"></p>

    <!-- Tab bar -->
    <div class="card" style="padding: 16px;">
      <div class="tab-bar" id="levelTabs"></div>
      <div id="tabContents"></div>
    </div>
  </div>

  <div id="footer"></div>

  <!-- Tutor Profile Modal -->
  <div class="modal-overlay" id="tutorModal" onclick="if(event.target===this)this.classList.remove('active')">
    <div class="modal" id="tutorModalContent"></div>
  </div>

  <script src="../js/shared.js"></script>
  <script>
    if (!isLoggedIn() || !isStudent()) { window.location.href = 'login.html'; }

    const user = getUser();
    document.getElementById('userDisplayName').textContent = user.first_name || user.username;
    const studentLevels = user.student_levels || [];
    document.getElementById('levelsDisplay').textContent = 'مستوياتك: ' + studentLevels.map(c => LEVEL_MAP[c] || c).join(' · ');

    const ALL_LEVELS = LEVELS_DATA.map(l => l.code);
    const tabsDiv = document.getElementById('levelTabs');
    const contentsDiv = document.getElementById('tabContents');
    let activeLevel = studentLevels[0] || 'quran';

    // Build only tabs for levels the student has
    const displayLevels = studentLevels.length ? studentLevels : ALL_LEVELS;
    displayLevels.forEach((level, i) => {
      const isActive = i === 0;
      tabsDiv.innerHTML += `<span class="tab ${isActive?'active':''}" onclick="switchLevel('${level}',this)"><i class="fas ${LEVEL_ICONS[level] || 'fa-book'}"></i> ${LEVEL_MAP[level] || level}</span>`;
    });

    function buildTabContent(level) {
      if (level === 'quran' || level === 'kindergarten' || level === 'languages') {
        return `
          <div class="card">
            <h3>طلب ${LEVEL_MAP[level]} جديد</h3>
            <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px;">${level === 'quran' ? 'حدد جزأ البداية وأوقاتك المتاحة' : level === 'kindergarten' ? 'حدد الوحدة الدراسية الحالية' : 'حدد مستوى CEFR الحالي واللغة'}</p>
            <form id="structuredForm" onsubmit="submitStructured(event)">
              <input type="hidden" name="education_level" value="${level}">
              <div class="form-row">
                <div class="form-group">
                  <label>الدولة</label>
                  <select name="country" required>
                    <option value="SA">السعودية</option>
                    <option value="KW">الكويت</option>
                    <option value="AE">الإمارات</option>
                    <option value="QA">قطر</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>نوع الجلسة</label>
                  <select name="session_type" onchange="document.getElementById('studentsGroupSt').style.display=this.value==='group'?'block':'none'">
                    <option value="solo">فردي</option>
                    <option value="group">مجموعة</option>
                  </select>
                </div>
                <div class="form-group" id="studentsGroupSt" style="display:none;">
                  <label>عدد الطلاب</label>
                  <input type="number" name="students_count" value="2" min="2" max="10">
                </div>
              </div>
              ${level === 'quran' ? `
              <div class="form-row">
                <div class="form-group"><label>جزأ البداية (من)</label><input type="number" name="start_juz" min="1" max="30" value="1" required></div>
                <div class="form-group"><label>الجزء الحالي</label><input type="number" name="current_juz" min="1" max="30" value="1" required></div>
              </div>` : level === 'kindergarten' ? `
              <div class="form-row">
                <div class="form-group"><label>الوحدة الحالية</label><input type="text" name="current_unit" placeholder="مثال: وحدة 3" required></div>
                <div class="form-group"><label>البدء من وحدة</label><input type="text" name="start_unit" placeholder="مثال: وحدة 1" required></div>
              </div>` : level === 'languages' ? `
              <div class="form-row">
                <div class="form-group"><label>اللغة</label><select name="language" required>
                  <option value="en">الإنجليزية</option><option value="fr">الفرنسية</option>
                  <option value="de">الألمانية</option><option value="es">الإسبانية</option>
                  <option value="it">الإيطالية</option><option value="tr">التركية</option>
                  <option value="zh">الصينية</option><option value="ru">الروسية</option>
                </select></div>
                <div class="form-group"><label>مستوى CEFR الحالي</label><select name="current_cefr" required>
                  <option value="A1">A1</option><option value="A2">A2</option>
                  <option value="B1">B1</option><option value="B2">B2</option>
                  <option value="C1">C1</option><option value="C2">C2</option>
                </select></div>
                <div class="form-group"><label>البدء من مستوى</label><select name="start_cefr" required>
                  <option value="A1">A1</option><option value="A2">A2</option>
                  <option value="B1">B1</option><option value="B2">B2</option>
                  <option value="C1">C1</option><option value="C2">C2</option>
                </select></div>
              </div>` : ''}
              <div class="form-group">
                <label>ملاحظات</label>
                <textarea name="notes" placeholder="ملاحظات إضافية للمدرس..." style="min-height:50px;"></textarea>
              </div>
              <button type="submit" class="btn btn-primary" id="structBtn">إرسال الطلب</button>
            </form>
            <div id="structResult" class="hidden" style="margin-top:12px;"></div>
          </div>

          <h3 style="margin-bottom:12px;">طلباتي — ${LEVEL_MAP[level]}</h3>
          <div id="myLevelFiles"><p class="empty">جاري التحميل...</p></div>

          <h3 style="margin:20px 0 12px;">المدرسون المتاحون — ${LEVEL_MAP[level]}</h3>
          <div id="availableTutors"><p class="empty">جاري التحميل...</p></div>

          <h3 style="margin:20px 0 12px;">التقدم — ${LEVEL_MAP[level]}</h3>
          <div id="myProgress"><p class="empty">لا يوجد تقدم بعد</p></div>

          <h3 style="margin:20px 0 12px;">العروض المقدمة</h3>
          <div id="offersList"><p class="empty">لا توجد عروض</p></div>
        `;
      } else {
        // Academic levels: university, high_school, middle_school, primary — PDF upload
        return `
          <div class="card">
            <h3>رفع ملف أكاديمي جديد — ${LEVEL_MAP[level]}</h3>
            <div class="upload-zone">
              <i class="fas fa-cloud-upload-alt" style="font-size:2rem;color:var(--accent-purple);margin-bottom:8px;"></i>
              <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px;">ارفع ملف PDF وسيحلله الذكاء الاصطناعي لتحديد مستواك واقتراح السعر</p>
              <form id="academicForm" onsubmit="submitAcademic(event,'${level}')">
                <input type="file" name="file" accept=".pdf" required style="display:block;margin:0 auto 12px;">
                <input type="hidden" name="education_level" value="${level}">
                <div class="form-row">
                  <div class="form-group"><label>الدولة</label><select name="country" required><option value="SA">السعودية</option><option value="KW">الكويت</option><option value="AE">الإمارات</option><option value="QA">قطر</option></select></div>
                  <div class="form-group"><label>النوع</label><select name="session_type" onchange="document.getElementById('studentsGroupAc').style.display=this.value==='group'?'block':'none'"><option value="solo">فردي</option><option value="group">مجموعة</option></select></div>
                  <div class="form-group" id="studentsGroupAc" style="display:none;"><label>عدد الطلاب</label><input type="number" name="students_count" value="2" min="2" max="10"></div>
                </div>
                <button type="submit" class="btn btn-primary" id="acadBtn">رفع وتحليل بالذكاء الاصطناعي</button>
              </form>
              <div id="acadResult" class="hidden" style="margin-top:12px;"></div>
            </div>
          </div>
          <h3 style="margin:20px 0 12px;">ملفاتي — ${LEVEL_MAP[level]}</h3>
          <div id="myLevelFiles"><p class="empty">جاري التحميل...</p></div>
          <h3 style="margin:20px 0 12px;">المدرسون المتاحون — ${LEVEL_MAP[level]}</h3>
          <div id="availableTutors"><p class="empty">جاري التحميل...</p></div>
          <h3 style="margin:20px 0 12px;">العروض المقدمة</h3>
          <div id="offersList"><p class="empty">لا توجد عروض</p></div>
        `;
      }
    }

    function switchLevel(level, el) {
      activeLevel = level;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      contentsDiv.innerHTML = buildTabContent(level);
      loadLevelData(level);
    }

    // Init first tab
    contentsDiv.innerHTML = buildTabContent(activeLevel);
    loadLevelData(activeLevel);

    async function loadLevelData(level) {
      loadFiles(level);
      loadTutors(level);
      loadProgress(level);
      loadOffers(level);
    }

    async function loadFiles(level) {
      const el = document.getElementById('myLevelFiles');
      if (!el) return;
      try {
        const res = await api('GET', `/files/?level=${level}`);
        if (!Array.isArray(res)) { el.innerHTML = '<p class="empty">لا توجد ملفات</p>'; return; }
        el.innerHTML = res.length ? `<div class="table-wrap"><table>
          <tr><th>#</th><th>الحالة</th><th>التاريخ</th></tr>
          ${res.map(f => `<tr><td>${f.id}</td><td><span class="badge badge-${f.status}">${f.status}</span></td><td>${new Date(f.created_at).toLocaleDateString('ar')}</td></tr>`).join('')}
        </table></div>` : '<p class="empty">لا توجد ملفات</p>';
      } catch { el.innerHTML = '<p class="empty">خطأ في التحميل</p>'; }
    }

    async function loadTutors(level) {
      const el = document.getElementById('availableTutors');
      if (!el) return;
      try {
        const res = await api('GET', `/users/available-tutors/?level=${level}`);
        if (!Array.isArray(res) || !res.length) { el.innerHTML = '<p class="empty">لا يوجد مدرسون متاحون لهذا المستوى</p>'; return; }
        el.innerHTML = res.map(t => `
          <div class="tutor-card">
            <img src="${t.profile_picture_url || ''}" alt="" onerror="this.style.display='none'">
            <div class="tutor-info">
              <div class="name"><span class="online-dot"></span>${t.first_name || ''} ${t.last_name || ''}</div>
              <div class="detail">${t.specialization || ''} ${t.years_experience ? '· ' + t.years_experience + ' سنة' : ''}</div>
            </div>
            <button class="btn btn-sm btn-ghost" onclick="openTutorProfile(${t.id})">عرض</button>
          </div>
        `).join('');
      } catch { el.innerHTML = '<p class="empty">خطأ في التحميل</p>'; }
    }

    async function loadProgress(level) {
      const el = document.getElementById('myProgress');
      if (!el) return;
      try {
        const res = await api('GET', `/offers/progress/`);
        // Filter progress entries related to this level's files
        if (!Array.isArray(res) || !res.length) { el.innerHTML = '<p class="empty">لا يوجد تقدم بعد</p>'; return; }
        el.innerHTML = res.map(e => {
          const fromTo = e.juz_from ? `الجزء ${e.juz_from} ← ${e.juz_to}` :
            e.unit_from ? `${e.unit_from} ← ${e.unit_to}` :
            e.cefr_from ? `${e.cefr_from} ← ${e.cefr_to}` : '—';
          return `<div class="progress-entry">
            <div class="date">${new Date(e.created_at).toLocaleDateString('ar')}</div>
            <div class="fromto">${fromTo}</div>
            ${e.tutor_notes ? `<div style="font-size:0.85rem;color:var(--text-gray);">📝 ${e.tutor_notes}</div>` : ''}
          </div>`;
        }).join('');
      } catch { el.innerHTML = '<p class="empty">خطأ في التحميل</p>'; }
    }

    async function loadOffers(level) {
      const el = document.getElementById('offersList');
      if (!el) return;
      try {
        const res = await api('GET', `/offers/`);
        if (!Array.isArray(res) || !res.length) { el.innerHTML = '<p class="empty">لا توجد عروض</p>'; return; }
        el.innerHTML = `<div class="table-wrap"><table>
          <tr><th>#</th><th>السعر</th><th>الحالة</th><th>إجراء</th></tr>
          ${res.map(o => `<tr>
            <td>${o.id}</td>
            <td>${o.tutor_price || o.price}</td>
            <td><span class="badge badge-${o.status}">${o.status}</span></td>
            <td>${o.status === 'pending' ? `<button class="btn btn-sm btn-primary" onclick="acceptOffer(${o.id})">قبول</button>` : '—'}</td>
          </tr>`).join('')}
        </table></div>`;
      } catch { el.innerHTML = '<p class="empty">لا توجد عروض</p>'; }
    }

    async function submitAcademic(e, level) {
      e.preventDefault();
      const btn = document.getElementById('acadBtn');
      btn.disabled = true; btn.textContent = 'جاري التحليل...';
      const fd = new FormData(e.target);
      try {
        const res = await fetch(API_BASE + '/files/upload/', {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken() }, body: fd,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(data));
        document.getElementById('acadResult').classList.remove('hidden');
        document.getElementById('acadResult').innerHTML = `<div class="price-box">
          <div class="price-item"><div class="num">${data.base_price || data.pricing_breakdown?.base_price || '—'}</div><div class="lbl">السعر</div></div>
          <div class="price-item"><div class="num">${data.specialization || data.subject_type || '—'}</div><div class="lbl">التخصص</div></div>
        </div>`;
        loadLevelData(level);
        e.target.reset();
      } catch (e) { alert('خطأ: ' + e.message); }
      finally { btn.disabled = false; btn.textContent = 'رفع وتحليل بالذكاء الاصطناعي'; }
    }

    async function submitStructured(e) {
      e.preventDefault();
      const btn = document.getElementById('structBtn');
      btn.disabled = true; btn.textContent = 'جاري الإرسال...';
      const data = Object.fromEntries(new FormData(e.target));
      try {
        const res = await api('POST', '/files/structured-request/', data);
        document.getElementById('structResult').classList.remove('hidden');
        document.getElementById('structResult').innerHTML = `<div class="price-box"><div style="color:var(--accent-purple);font-weight:700;">✅ تم إرسال الطلب بنجاح</div></div>`;
        loadLevelData(activeLevel);
        e.target.reset();
      } catch (e) { alert('خطأ: ' + (e.data?.error || e.message)); }
      finally { btn.disabled = false; btn.textContent = 'إرسال الطلب'; }
    }

    async function acceptOffer(id) {
      if (!confirm('تأكيد قبول العرض؟')) return;
      try {
        await api('PUT', `/offers/${id}/accept/`);
        alert('تم قبول العرض!');
        loadLevelData(activeLevel);
      } catch (e) { alert('خطأ: ' + (e.data?.error || e.message)); }
    }

    async function openTutorProfile(id) {
      try {
        const t = await api('GET', `/users/tutors/${id}/`);
        document.getElementById('tutorModalContent').innerHTML = `
          <div style="text-align:center;margin-bottom:16px;">
            <img src="${t.profile_picture_url || ''}" alt="" style="width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:8px;" onerror="this.style.display='none'">
            <h3>${t.first_name || ''} ${t.last_name || ''}</h3>
            <span class="badge badge-matched">${LEVEL_MAP[t.teaching_level] || t.teaching_level || ''}</span>
          </div>
          ${t.bio ? `<p style="color:var(--text-gray);font-size:0.9rem;text-align:center;margin-bottom:16px;">${t.bio}</p>` : ''}
          <div style="display:grid;gap:8px;">
            <div><strong>التخصص:</strong> ${t.specialization || '—'}</div>
            <div><strong>سنوات الخبرة:</strong> ${t.years_experience || '—'}</div>
            <div><strong>المؤهل:</strong> ${t.education || '—'}</div>
            <div><strong>الشهادات:</strong> ${t.certificates || '—'}</div>
            ${t.languages?.length ? `<div><strong>اللغات:</strong> ${t.languages.map(l => LANG_MAP[l] || l).join('، ')}</div>` : ''}
          </div>
          <button class="btn btn-primary" onclick="document.getElementById('tutorModal').classList.remove('active')" style="width:100%;margin-top:16px;">إغلاق</button>
        `;
        document.getElementById('tutorModal').classList.add('active');
      } catch { alert('خطأ في تحميل البيانات'); }
    }

    // Auto-refresh
    setInterval(() => { if (activeLevel) loadLevelData(activeLevel); }, 15000);
  </script>
</body>
</html>
