<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>طلب تحفيظ قرآن - تفاعلي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/frontend/css/design-system.css">
  <style>
    body { padding-bottom: 40px; }
    .quran-header { text-align: center; padding: 40px 0; }
    .quran-header i { font-size: 3rem; color: #10B981; margin-bottom: 12px; }
    .quran-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .quran-header p { color: var(--text-gray-muted); max-width: 500px; margin: 0 auto; }
    .form-section { max-width: 640px; margin: 0 auto; }
    .students-count-input { display: none; }
  </style>
</head>
<body>
  <div class="glow-ambient glow-purple"></div>
  <div class="glow-ambient glow-blue"></div>
  <div id="navbar"></div>

  <div class="container">
    <div class="quran-header">
      <i class="fas fa-mosque"></i>
      <h1>طلب <span class="gradient-text">تحفيظ قرآن</span> جديد</h1>
      <p>اختر جزأ البداية وحدد أوقاتك المتاحة لنجد لك المدرس المناسب</p>
    </div>

    <div class="glass-card form-section" style="padding:24px;">
      <form id="quranForm">
        <input type="hidden" name="education_level" value="quran">

        <div class="form-row">
          <div class="form-group">
            <label>من الجزء</label>
            <input type="number" name="start_juz" min="1" max="30" value="1" required>
          </div>
          <div class="form-group">
            <label>الجزء الحالي</label>
            <input type="number" name="current_juz" min="1" max="30" value="1" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>الدولة</label>
            <select name="country" required>
              <option value="SA">السعودية</option>
              <option value="KW">الكويت</option>
              <option value="AE">الإمارات</option>
              <option value="QA">قطر</option>
            </select>
          </div>
          <div class="form-group">
            <label>نوع الجلسة</label>
            <select name="session_type" id="sessionType" required>
              <option value="solo">فردي</option>
              <option value="group">مجموعة</option>
            </select>
          </div>
          <div class="form-group students-count-input" id="studentsGroup">
            <label>عدد الطلاب</label>
            <input type="number" name="students_count" value="2" min="2" max="10">
          </div>
        </div>

        <div class="form-group">
          <label>أوقاتك المتاحة</label>
          <div id="availabilityGrid" style="display:flex;flex-direction:column;gap:8px;"></div>
        </div>

        <div class="form-group">
          <label>ملاحظات</label>
          <textarea name="notes" placeholder="أي ملاحظات للمدرس..."></textarea>
        </div>

        <div id="quranResult" style="display:none;margin-bottom:12px;"></div>
        <button type="submit" class="btn btn-primary" id="quranBtn" style="width:100%;">إرسال الطلب</button>
      </form>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <a href="/student-dashboard" class="btn btn-secondary"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
    </div>
  </div>

  <div id="footer"></div>

  <script src="/frontend/js/shared.js"></script>
  <script>
    redirectIfGuest();
    if (!isStudent()) { window.location.href = '/login'; }

    const grid = document.getElementById('availabilityGrid');
    DAYS.forEach(d => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:10px;';
      row.innerHTML = `
        <span style="min-width:60px;font-weight:600;color:var(--text-gray);">${d.label}</span>
        <input type="text" placeholder="مثال: 4-6 مساءً" style="flex:1;padding:8px 10px;background:rgba(255,255,255,0.03);border:var(--border-glass);border-radius:var(--radius-sm);color:var(--text-white);font-family:inherit;">
        <input type="hidden" name="weekly_availability_${d.key}" value="">
      `;
      const textInput = row.querySelector('input[type="text"]');
      const hiddenInput = row.querySelector('input[type="hidden"]');
      textInput.addEventListener('input', () => { hiddenInput.value = textInput.value; });
      grid.appendChild(row);
    });

    document.getElementById('sessionType').addEventListener('change', function() {
      document.getElementById('studentsGroup').style.display = this.value === 'group' ? 'block' : 'none';
    });

    document.getElementById('quranForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('quranBtn');
      btn.disabled = true; btn.textContent = 'جاري الإرسال...';

      const times = {};
      document.querySelectorAll('[name^="weekly_availability_"]').forEach(h => {
        const day = h.name.replace('weekly_availability_', '');
        if (h.value) times[day] = [h.value];
      });

      const data = {
        education_level: 'quran',
        start_juz: parseInt(this.start_juz.value),
        current_juz: parseInt(this.current_juz.value),
        country: this.country.value,
        session_type: this.sessionType.value,
        weekly_availability: times,
        notes: this.notes.value,
      };
      if (data.session_type === 'group') data.students_count = parseInt(this.students_count.value);

      try {
        const res = await fetch(API_BASE + '/files/structured-request/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
          body: JSON.stringify(data),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(result));
        document.getElementById('quranResult').style.display = 'block';
        document.getElementById('quranResult').innerHTML = '<div class="price-box" style="margin:0;"><div style="color:#10B981;font-weight:700;text-align:center;">✅ تم إرسال طلب التحفيظ بنجاح</div></div>';
        this.reset();
      } catch (e) { alert('خطأ: ' + e.message); }
      finally { btn.disabled = false; btn.textContent = 'إرسال الطلب'; }
    });
  </script>
</body>
</html>
